# =============================================================================
# GLOBAL ROOT CONFIG (Must stay at the absolute top!)
# =============================================================================
palette = 'colors'
add_newline = false

format = """
$username$hostname $directory$git_branch $cmd_duration
  $character"""

# =============================================================================
# DYNAMIC MATUGEN PALETTE
# =============================================================================
[palettes.colors]
color1 = '#e0c46d'
color2 = '#3c2f00'
color3 = '#cec6b4'
color4 = '#231f17'
color5 = '#3c2f00'
color6 = '#16130b'
color7 = '#16130b'
color8 = '#e0c46d'
color9 = '#accfaf'

# =============================================================================
# MODULES CONFIG
# =============================================================================
[fill]
symbol = '-'
style = 'fg:color3'

[character]
success_symbol = "[о©ұ пҒӢ](bold color9)"
error_symbol = "[пҖҚ пҒӢ](bold @{error})"

[package]
disabled = true

[git_branch]
style = "bg:color8"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:color8)[$symbol $branch(:$remote_branch)](fg:color2 bg:color8)[оӮҙ ](bold fg:color8)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[username]
style_user = "bold bg:color8 fg:color2"
style_root = "red bold"
format = "[оӮ¶](bold fg:color8)[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:color8 bold fg:color2)[оӮҙ](bold fg:color8)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:color4 fg:color3"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:color4)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:color4)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:color1)[у°Әў $duration](bold bg:color1 fg:color2)[оӮҙ](bold fg:color1)'